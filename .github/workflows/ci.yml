name: CI

on:
  push:
  pull_request:

env:
  NX_DAEMON: "false"
  FORMAL_SUBMODULES: "repos/protocol repos/client repos/platform"
  CI_OPTIONAL_SUBMODULES: "repos/brand-site"

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  submodule-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Checkout formal submodules
        run: |
          git submodule sync -- ${FORMAL_SUBMODULES}
          git submodule update --init --force -- ${FORMAL_SUBMODULES}
      - name: Validate submodule SHA state
        run: node tools/validate-submodules.mjs

  workspace-install:
    runs-on: ubuntu-latest
    needs: submodule-integrity
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Checkout formal submodules
        run: |
          git submodule sync -- ${FORMAL_SUBMODULES}
          git submodule update --init --force -- ${FORMAL_SUBMODULES}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile

  nx-graph-and-affected:
    runs-on: ubuntu-latest
    needs: workspace-install
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Checkout formal submodules
        run: |
          git submodule sync -- ${FORMAL_SUBMODULES}
          git submodule update --init --force -- ${FORMAL_SUBMODULES}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm exec nx show projects
      - run: pnpm exec nx graph --affected --file=.nx/affected-graph.html

  change-bundle-validate:
    runs-on: ubuntu-latest
    needs: workspace-install
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Checkout formal submodules
        run: |
          git submodule sync -- ${FORMAL_SUBMODULES}
          git submodule update --init --force -- ${FORMAL_SUBMODULES}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: node tools/validate-change-bundle.mjs

  contracts-check:
    runs-on: ubuntu-latest
    needs: workspace-install
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Checkout formal submodules
        run: |
          git submodule sync -- ${FORMAL_SUBMODULES}
          git submodule update --init --force -- ${FORMAL_SUBMODULES}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: node tools/check-boundaries.mjs
      - run: node tools/contracts-check.mjs

  source-integration-check:
    runs-on: ubuntu-latest
    needs: workspace-install
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - name: Checkout formal submodules
        run: |
          git submodule sync -- ${FORMAL_SUBMODULES}
          git submodule update --init --force -- ${FORMAL_SUBMODULES}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: node tools/source-integration-check.mjs
