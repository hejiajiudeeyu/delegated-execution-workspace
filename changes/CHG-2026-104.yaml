notes: "Adds a read-only deployability:action-plan operator next-action selector between the dashboard payload and full command catalog. The selector combines dashboard and command metadata into profile-level recommended commands, dashboard-safe command lists, public-exposure gates, service-touching commands, safety notes, and JSON entry points without reading .env, calling Docker, binding ports, probing networks, or printing secrets. Updates overview, quickstart, safety, doctor, dashboard, handoff, PRDs, readiness docs, and call-anything-brand-site Deployability Profiles to document the action-plan surface. Keeps protocol, client, and platform SHAs unchanged."
