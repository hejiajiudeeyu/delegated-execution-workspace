notes: "Adds --list-profiles / --profiles to the read-only deployability:action-plan command so operators and dashboards can list supported profile keys, aliases, pipeline keys, purposes, and next focused profile commands before choosing a target. The profile-list mode does not call dashboard/catalog metadata, read .env, call Docker, bind ports, probe networks, or print secret values. Updates PRDs, readiness docs, runbooks, README, and call-anything-brand-site Deployability Profiles. Keeps protocol, client, and platform SHAs unchanged."
