notes: "Adds selfhost:ops-report -- --json so dashboards, CI, and management scripts can consume the same non-secret handoff data as the Markdown ops report: deploy paths, URLs, host ports, secret hygiene status, operator commands, and safety notes. The JSON path does not write a Markdown file and does not print secret values. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
