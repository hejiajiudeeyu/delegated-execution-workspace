notes: "Adds deployability:commands and deployability:commands -- --json as a fourth-repo, read-only command catalog for humans, dashboards, and CI. The command merges deployability overview, quickstart, and safety metadata into a filterable command list with category, posture, first-use track, and pipeline filters, including inherited safety posture for profile-specific command variants. It does not read .env files, call Docker, bind ports, probe networks, or print secrets. Updates deployability:dashboard with per-pipeline summaries for dashboard/CI consumers. Updates quickstart, safety, doctor, dashboard, and handoff command maps; adds command catalog and dashboard tests; fixes safety matrix self-registration for deployability:safety; updates README, deployability PRDs, local-dev runbooks, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
