notes: "Adds --profile filtering to the read-only deployability:action-plan command so operators can focus the next-action selector on one target such as public-stack. JSON now includes profile_filter, accepts profile keys and common aliases, narrows profiles to the requested target, and reports unknown profile names as blockers instead of falling back to all profiles. Updates PRDs, runbooks, readiness docs, and call-anything-brand-site Deployability Profiles to document focused action plans. Keeps protocol, client, and platform SHAs unchanged."
