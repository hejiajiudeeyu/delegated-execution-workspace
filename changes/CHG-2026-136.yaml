notes: "Implements the client-owned Wave 1 first-real-call fixes for T-101/T-102/T-103. The ops package now bundles the caller-skill MCP adapter and declares external runtime dependencies needed by bundled workspace packages, clean-room tarball bootstrap reaches SUCCEEDED, mcp spec resolves a packaged adapter entry, and global ui start reports a source-checkout requirement instead of an opaque path error. Ops Console Vite proxy now follows OPS_PORT_SUPERVISOR with 8079 as default. Bootstrap only enters platform mode when --platform is explicit; a leftover PLATFORM_API_BASE_URL warns and remains local-only. Local verification used SKIP_ORIGIN_REACHABILITY=1 because the client commit had not been pushed: check:submodules, check:boundaries, check:bundles, test:contracts, and test:integration all passed. Protocol, platform, and brand-site SHAs remain unchanged."
