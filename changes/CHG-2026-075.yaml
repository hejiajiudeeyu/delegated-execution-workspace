notes: "Adds selfhost:config -- --json so CI, dashboards, and management scripts can consume Docker compose config pass/fail, blockers, and stderr metadata without parsing terminal output. The JSON path intentionally omits docker compose config stdout because expanded compose output can contain environment values. Text config behavior remains available for private operator terminals. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
