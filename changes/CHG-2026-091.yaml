notes: "Adds deployability:handoff and deployability:handoff -- --json as a fourth-repo, read-only ecosystem handoff report. The command writes a non-secret Markdown artifact under exports/deployability/ by default, supports --output, and returns current bundle, compatibility status, command-map, safety-note, and next-validation metadata without reading .env files, calling Docker, binding ports, probing networks, or printing secrets. Updates README, local-dev runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
