notes: "T-403 public-docs rehearsal found that delexec-ops auth register --platform https://callanything.xyz/platform dropped the /platform prefix when building /v1/users/register URLs, causing the CLI to hit the brand-site route and parse HTML as JSON. Client commit 2035cd1cb92d37b1b2f937b3a350bcfe75c77e9b preserves platform base URL path prefixes, adds an integration regression test for prefixed platform base URLs, and bumps @delexec/ops to 0.1.3. Local verification passed the targeted prefixed-platform auth test, full ops CLI integration, npm test, and npm run test:packages. GitHub CI run 27477477188 passed npm ci, unit, integration, and package checks. GitHub Actions publish run 27477549634 passed npm test, npm run test:packages, and npm publish --workspace @delexec/ops --access public. npm registry returns @delexec/ops@0.1.3, and real smoke /tmp/delexec-ops-013-prefix-smoke-20260613T200400Z installed it globally and registered against https://callanything.xyz/platform successfully."
