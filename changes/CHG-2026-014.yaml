notes: "client-only runtime fix. During fresh-home local smoke validation, delexec-ops bootstrap succeeded but delexec-ops ui start timed out because the workspace UI launch path used pnpm run dev -- --host/--port, which forwarded a literal -- into vite and caused the requested host/port to be ignored. The CLI now launches the workspace console with pnpm exec vite so host/port reach vite directly, and ops-cli integration coverage now includes a real workspace_vite ui-start case on a requested port. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts, and test:integration in the fourth-repo workspace after pushing client commit 1ecbb4f to origin branch codex/ops-startup-lock. check:submodules completed with cached-remote fallback warnings for protocol fetches, but the validator still certified the pinned refs as reachable from cached origin state."
