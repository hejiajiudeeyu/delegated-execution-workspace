notes: "Implements brand-site Wave 2 first-real-call fixes for T-201, T-202, and T-204. Caller Quick Start now documents session setup with a passphrase, reads the returned token, and uses contact_email for HTTP caller registration. Responder Quick Start now obtains OPS_SESSION before HTTP example calls, uses the current --cmd and --url adapter flags, and marks Marketplace review as an optional advanced step requiring a hosted or self-hosted platform. Marketplace fallback data is labeled as DEMO preview, no longer claims healthy/reviewed trust, and successful empty API catalogs clear fallback entries into an honest empty state. Added smoke:first-real-call-content to guard these public docs and marketplace claims. Brand-site verification passed npm run smoke:first-real-call-content, targeted eslint on touched files, npm run build, and prerendered HTML grep for DEMO/correct command markers. Full npm run lint remains blocked by pre-existing shared UI lint errors in carousel.tsx and use-mobile.ts. Fourth-repo local verification used SKIP_ORIGIN_REACHABILITY=1 because the brand-site commit had not been pushed: check:submodules, check:boundaries, check:bundles, test:contracts, and test:integration all passed."
