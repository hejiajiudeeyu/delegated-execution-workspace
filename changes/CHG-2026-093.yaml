notes: "Adds deployability:safety and deployability:safety -- --json as a fourth-repo, read-only descriptive safety posture matrix for deployment commands. The matrix records read/write/startup/stop, Docker, network, private-terminal-text, public-exposure-gate, CI-safe, and dashboard-safe posture metadata without reading .env files, calling Docker, binding ports, probing networks, or printing secrets. Profile-specific doctor, preflight, status, smoke, and audit commands remain authoritative for runtime safety. Updates README, local-dev runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
