notes: "client-only UX polish on ops-console. Three threads in commit 2dc1ba5: (1) lib/api.ts replaced with apiCall returning a discriminated ApiResult<T>; parses canonical {error:{code,message,retryable}} envelopes, surfaces synthetic codes for NETWORK_ERROR / PARSE_ERROR / ABORTED / HTTP_<N>, recovers session once on 401 via /auth/session, and auto-toasts a localized Chinese message (suppressible via silent:true). lib/error-messages.ts ships the canonical-code -> Chinese map with a status-based fallback so unknown codes still render meaningful text. All 17 .tsx requestJson call sites migrated; per-page error-handling boilerplate dropped from ~25 LOC to ~3 LOC. (2) New hooks/usePoll.ts isolates the polling lifecycle so the previous 'fastWhen evaluated as a useEffect dep recreates the timer every render' jitter bug is gone — fastWhen is read on each tick via ref, plus the hook pauses while document.hidden and re-fires on visibilitychange. CallerApprovalsPage and CallsPage list polls + CallsPage RequestDetail (which now stops polling once result_package materializes) all switched over. (3) GlobalPolicyCard mode switch now opens an AlertDialog with a per-transition impact summary (current -> target labels, bulleted impact list with current whitelist/blocklist counts, what becomes auto-approved vs still gated) and renders the allow_all confirm in destructive style; cancel restores the previous mode without a network round-trip. Also cleared dead pre-React vanilla code: apps/ops-console/src/{main.js,view-model.js,styles.css} (~1.86 KLoC) and the two unit tests targeting them (tests/unit/{console-view-models,ops-console.dom}.test.js). No protocol surface, HTTP wire, supervisor, or transport changes — entirely an ops-console React refactor. Verification: client repo `corepack pnpm run test:unit` green (8 files, 97 tests, 890ms), including the React Testing Library suites for AccessListsPage, CallerApprovalsPage and ErrorBoundary which exercise apiCall happy + error envelopes end-to-end. Integration tests not re-run for this CHG: the surface they cover (CLI + supervisor + caller-skill HTTP + MCP adapter + responder controller) is untouched, and the MCP-host golden-four loop is the normative end-to-end check (last passed under CHG-2026-008 against the same protocol/platform pair pinned here). Diff stat for the client commit: 24 files changed, 803 insertions, 3130 deletions."
