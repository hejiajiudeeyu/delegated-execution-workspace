notes: "Adds deployability:dashboard ecosystem_readiness metadata that turns the ecosystem PRD daily-deployable definition into a machine-readable scorecard for profile choice, generated secrets, startup path, doctor path, runtime inspection, boundary understanding, and brand-site story. The dashboard reports daily_deployable_with_safety_gates when the scorecard passes, keeping public-stack exposure and production readiness behind explicit gates. Extends the deployability safety matrix and command catalog coverage for dev:local:status and selfhost:doctor so management/status commands are searchable and dashboard-safe. Updates bilingual ecosystem and pipeline PRDs plus call-anything-brand-site Deployability Profiles and smoke coverage to document the scorecard. Keeps protocol, client, and platform SHAs unchanged."
