notes: "client-only UX polish on ops-console. Three threads in commit 981d83b: (1) BrandBackdrop refactor — extracted to apps/ops-console/src/components/layout/BrandBackdrop.tsx with variant=\"auth\"|\"workspace\". The duplicated 56-line BrandBackdrop function in AppShell.tsx and AuthPages.tsx is gone. The auth variant keeps the full brand statement (40% 9-cell color grid + 20% brand-grid SVG + 6 black/colored geometric shapes) for setup/unlock pages. The workspace variant is a faint watermark only: same brand-grid SVG at ~3.5% opacity, no color grid, no geometric shapes — so the working console no longer has loud color blocks bleeding through every gap between cards. main also got bg-background/85 to mute the watermark beneath cards. (2) AccessListsPage rewrite — removed the floating top-right mode badge that looked like an action button; replaced with a single ModeStatusCard that renders mode-specific copy (manual/allow_listed/allow_all) in amber/cyan/rose tones with a 「切换模式」shortcut to /caller/preferences and never exposes the raw `allow_listed` enum string to users. Tabs collapsed from `grid w-full grid-cols-3` to inline-flex with compact icon+label+count chips. ListPanel restructured into three explicit zones (header with title/count/「未生效」flag → empty-state-or-list with divide-y compact rows → bottom 「添加新条目」section with proper Label and primary Add button). Empty state now ships an instructive hint instead of a single 「暂无 X」line. Add input placeholder format changed from real-looking sample IDs to typed prompts (`responder_id，例如 my-company-bot`) so empty placeholders no longer look like populated entries. (3) Sidebar section label downscaled — was `text-xs font-bold uppercase tracking-widest` (visually heavier than the menu items themselves), now `text-xs font-semibold` paired with a small colored dot. No protocol surface, HTTP wire, supervisor, transport, or any non-ops-console code touched. Verification: `corepack pnpm run test:unit` green (8 files, 97 tests, ~945ms). The AccessListsPage test suite was updated to wrap renders in MemoryRouter (ModeStatusCard now uses <Link>) and to match the new placeholder/button copy. Integration tests not re-run for this CHG: same rationale as CHG-2026-009 — the React-only refactor doesn't touch the surface they cover (CLI + supervisor + caller-skill HTTP + MCP adapter + responder controller), MCP-host golden-four loop remains the normative end-to-end check from CHG-2026-008 against the same protocol/platform pinned here. Diff stat for the client commit: 6 files changed, 328 insertions, 203 deletions."
