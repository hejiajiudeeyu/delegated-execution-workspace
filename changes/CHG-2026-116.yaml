notes: "Adds deployability:runbook as a read-only, machine-readable profile runbook projection for operators and management UIs. The command reuses deployability:profiles and deployability:commands metadata to emit staged inspect, gate, start, verify, operate, and evidence phases for a selected profile, with profile aliases, safety posture, command metadata, blockers, and next commands. Brand-site docs now expose the runbook path. It does not read .env files, call Docker, bind ports, probe networks, or introduce protocol/client/platform runtime truth."
