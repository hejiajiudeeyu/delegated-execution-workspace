notes: "client-only fix. Ops supervisor now serializes per-service startup with an in-flight lock so concurrent ensureService/startManagedServices paths do not spawn duplicate skill-adapter, mcp-adapter, or responder processes during bootstrap/restart windows. Adds an ops-supervisor integration test that calls startManagedServices concurrently and asserts each managed service records a single service_started event. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts, and test:integration in the fourth-repo workspace after pushing client commit 93aa770 to origin branch codex/ops-startup-lock so reachability gates could certify the bundle."
