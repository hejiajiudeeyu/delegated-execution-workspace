notes: "Adds tools/published-image-smoke.mjs and test:published-image-smoke as a fourth-repo published-image validation wrapper for the public-stack profile. The wrapper validates that platform public-stack release images remain parameterized by IMAGE_REGISTRY and IMAGE_TAG, prints resolved rsp-platform/rsp-relay/rsp-gateway image refs, and delegates real smoke execution to repos/platform test:public-stack-smoke with COMPOSE_NO_BUILD=true and strict Docker mode by default. Verified against latest with public-stack smoke mode=published_image and gateway proxy success. PRDs, readiness docs, and local runbooks now distinguish this orchestration entry point from the platform-owned image build, publish, and release gates."
