notes: "Adds deployability:readiness as a read-only standalone daily-deployable scorecard for humans, CI jobs, and management UIs. The command reuses deployability:commands and deployability:doctor metadata plus the shared ecosystem readiness builder to report daily-deployable checks, evidence, summary counts, safety notes, blockers, warnings, and next commands without reading .env files, calling Docker, binding ports, probing networks, printing secrets, or introducing protocol/client/platform runtime truth."
