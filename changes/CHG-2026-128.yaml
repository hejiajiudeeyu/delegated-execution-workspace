notes: "Adds deployability:operator-checklist as a top-level public-stack operator readiness checklist for management surfaces. The command aggregates existing menu, recipe, operator onboarding check, release candidate review, and backup-plan metadata into one JSON/text payload, separates script blockers from operator_blockers, does not start services, bind ports, probe endpoints, publish images or packages, or print secrets, and does not introduce protocol/client/platform runtime truth."
