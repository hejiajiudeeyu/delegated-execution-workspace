notes: "Adds selfhost:rotate -- --json and selfhost:rotate -- --confirm --json so dashboards, CI, and operator runbooks can inspect secret rotation dry-run intent and confirmed rotation artifacts without parsing terminal prose. Dry-run JSON reports selected env path, keys that would rotate, next commands, and safety notes without modifying files. Confirmed JSON writes the existing .env rotation backup and rotated .env, then reports changed-file metadata, backup path, restart/smoke next commands, and safety notes without printing secret values. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
