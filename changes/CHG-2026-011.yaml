notes: "client-only chrome pass on ops-console: aligns shell layout with the high-fidelity prototype at call-anything-brand-site/src/design-system/shells/console-shell.tsx and the content contract at docs/console-content-spec.md §0. NO business page logic touched, NO API surface touched, NO behavior change — pure visual / layout / navigation chrome. (1) src/styles/console-mode.css NEW — scoped `.console-mode` activation layer matching brand-site verbatim. Adds the missing activation half (CHG-2026-010 had only added the token half via console-tokens.css). Includes light-brutalist accent kit (.c-ink-border / .c-shadow-1 / .c-lift / .c-status-* / .c-kicker / .c-terminal / .c-role-*) and remaps shadcn tokens for paper bg, ink #111 text, 4px default radius. (2) AppShell now wraps the entire authenticated subtree in <div class=\"console-mode\">, switches main column to a max-w-6xl container, and renders <FromContextChip/> above <Outlet/> so any page receiving ?from=<key> shows a back-chip without per-page wiring. (3) Sidebar rewritten to spec §0.4: all three role groups always visible (no more tab-switching nav); each group shows 11px uppercase label + colored role dot + 10.5px description (\"本机健康、传输与运行时\" / \"让 Agent 帮你调用 Hotline\" / \"把你写的能力发布成 Hotline\"); active item gets the brutalist signature (white bg + ink border + 2px hard offset shadow); 「上手 & 帮助」 footer added with three fixed links per spec §0.5; caller nav re-ordered to put 热线目录 first (per spec §5.2 it's the entry point for initiating calls). (4) Header redesigned to light-brutalist: brand kicker (ink-on-paper logo tile + Ops Console title) + pill role chip + right-side session pill + actions; per-tab nav removed from header (lives entirely in the sidebar now). (5) BrandBackdrop workspace variant tuned to prototype: 9-cell color grid at 8% (was off) + brand-grid SVG at 6% (was 3.5%); cards stay opaque white via --card so the pattern never competes with reading. (6) src/components/layout/FromContextChip.tsx NEW — reads ?from=<key>, renders a 「从『xxx』跳过来」 chip per spec §0.6, registered keys: dashboard-onboarding / dashboard-nextup / calls-retry / calls-detail / approvals-add-whitelist / approvals-tired-banner; unknown keys fail-safe (no chip). (7) /help route + minimal HelpPage stub added so the sidebar Help footer has a real destination; full multi-article content (TOC + 8 articles per spec §5.7) lands in a later stage. EXPLICITLY OUT OF SCOPE for Stage 1 (lands in Stage 2): Calls / Catalog / Approvals / Dashboard / AccessLists page rewrites, NextUp card, value-comparison disclosure, approval fatigue banner, whitelist-popover education, full /help content. Verification: tsc -p apps/ops-console/tsconfig.app.json --noEmit emits 22 errors, all pre-existing in ResponderHotlinesPage / ResponderReviewPage (Badge variant enums + DraftResponse field types) — count unchanged from main, verified by stash-pop comparison; vitest run --config tests/config/vitest.unit.config.mjs green (8 files, 97 tests, ~964ms). Integration tests not re-run — same rationale as CHG-2026-009/010: a chrome-only React refactor doesn't touch CLI / supervisor / caller-skill HTTP / MCP adapter / responder controller surfaces, MCP-host golden-four loop from CHG-2026-008 remains the normative end-to-end check against the same protocol/platform pinned here. Diff stat for the client commit: 9 files changed, 715 insertions, 147 deletions."
