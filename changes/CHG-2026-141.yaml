notes: "Implements first-real-call T-302 caller self-service billing reads. The platform now exposes GET /v1/tenants/me/balance and GET /v1/tenants/me/ledger for authenticated caller API keys, scopes the tenant to auth.user_id instead of accepting arbitrary tenant ids, supports existing ledger query parameters, and maps missing caller tenants to ERR_BILLING_NOT_ENABLED. The billing RFC's general tenant-id route remains admin/internal; this caller slice intentionally uses /me to avoid over-read. Platform verification passed targeted RED/GREEN billing integration, npm test, npm run test:service:packages, npm run test:deploy:config, and npm run test:public-stack-smoke. Fourth-repo validation used SKIP_ORIGIN_REACHABILITY=1 because the protocol/client/platform/brand-site commits are local-only."
