notes: "docs-only platform bump that records the first implementation-layer RFC layered on top of the platform direction RFC. Closes the platform-side P-1 milestone from §12 of the direction RFC by freezing what engineering needs to implement P-1 directly: 4 PostgreSQL tables (`tenant_balance`, `tenant_quota_window`, `tenant_balance_ledger`, `tenant_recharge_request`) with field names / types / NOT NULL / defaults / CHECK constraints all source-of-truth; 3 endpoints under the new `/v1/` namespace (`GET /v1/tenants/{tenant_id}/balance`, `GET /v1/tenants/{tenant_id}/ledger?cursor=&limit=&kind=`, `POST /v1/tenants/{tenant_id}/recharge`) — v0.1 platform-api stays untouched; quota lazy-reset algorithm with `SELECT FOR UPDATE` concurrency and three UTC-locked roll anchors (daily / monthly / total); standard `apply_balance_delta` shape with `version` column for optimistic-lock CAS — balance update + quota accumulation + ledger insert all in one SQL transaction; 6 frozen error codes (`ERR_TENANT_NOT_FOUND`, `ERR_BILLING_CURRENCY_UNSUPPORTED`, `ERR_QUOTA_EXCEEDED`, `ERR_BILLING_INTERNAL`, `ERR_RECHARGE_DUPLICATE_KEY`, `ERR_RECHARGE_NOT_AUTHORIZED`); 4 frozen monitoring metric IDs (`platform.tenant_balance.invariant_violation`, `platform.tenant_balance.cas_retry_p99`, `platform.quota_window.rolled`, `platform.tenant_balance.imbalance_ratio`); read-only invariant self-check daemon spec with 4 assertions (alerts only, never repairs). Deliberate divergence from the direction RFC, registered explicitly in §5.4: `hard_block_on_exceed` defaults to `false` for the duration of P-1 (direction RFC §3.2 says default true) — preflight quote arrives in P-2, and flipping default to true before P-2 would block calls that don't actually debit yet; migration to `true` is a P-2 implementation RFC concern. NO code change; the diff is exclusively two new markdown files under `repos/platform/docs/planned/design/`. zh-CN is the source of truth (1423 lines across both files; en is a literal mirror). On origin branch `codex/billing-p1-impl-rfc` plus main fast-forward. Verified on this pinned SHA combination by check:submodules (origin reachability green for `fcfd303` across both `main` and `codex/billing-p1-impl-rfc`), check:boundaries, check:bundles, test:contracts in the fourth-repo workspace. test:integration not re-run for this CHG: same rationale as CHG-2026-009..025 docs-only family — nothing in the integration path can move because the diff is exclusively new markdown under docs/planned/design/. Follow-up CHGs arrive when the P-1 milestones M1.1..M1.4 land actual code (DB migration / endpoint impl / quota daemon / monitoring) — at that point integration tests must run because schemas / contracts / runtime behaviour will all be in scope."
