notes: "Adds the fourth-repo selfhost:preflight command as a pre-up deployment safety gate. The command checks secret hygiene, docker compose config, and route output without requiring services to be running; for public-stack it fails while PUBLIC_SITE_ADDRESS remains localhost and prints public routes without leaking generated admin or bootstrap secret values. The selfhost-kit test now covers public-stack init warnings, unsafe preflight failure, safe-origin preflight success, and no secret leakage. The client submodule advances to 877df78 so ops-console Runtime and Help deployability guidance mention selfhost:preflight in the operator command sequence. Documentation and PRDs are updated to distinguish preflight as the pre-up gate and smoke as the post-start health gate. Verified with node --check tools/selfhost-kit.mjs, corepack pnpm run test:selfhost-kit, repos/client npm run test:unit, and the required fourth-repo ci gates."
