notes: "docs-only triple bump that records the billing direction-setting RFC trio in the super-repo. Closes T6-4 in the post-CHG-2026-022 roadmap. The bumped commits are: (1) protocol da30271 = `docs(planned): unify caller+responder balance in billing RFC appendix A.1.4` on top of a80a1fd `docs(planned): add billing & quota direction-setting RFC` — these two commits land repos/protocol/docs/planned/design/billing-and-quota.md (+ zh-CN), the T6-1 protocol direction RFC pinned as the source of truth for the value-pricing / unified-balance / zero-trust hotline / non-fiat points stance; on origin branch codex/billing-and-quota-rfc. (2) platform b84a9d8 = `docs(planned): add billing design RFC — platform surface direction` lands repos/platform/docs/planned/design/billing-design-rfc.md (+ zh-CN), the T6-2 platform-surface direction RFC mapping the protocol direction onto the 8 platform surfaces (tenant accounts, preflight quote, two-stage debit, auto-refund engine, trust_tier daemon, content review pipeline, dispute queue, take-rate location + webhook egress) and explicitly stating the reverse boundary (no cost pass-through, no half-refunds, no subjective-arbitration dashboard, no fiat withdrawal in phase 1); on origin branch codex/billing-design-rfc. (3) client 393476d = `docs(planned): add caller-side billing consent direction RFC` lands repos/client/docs/planned/design/billing-caller-consent.md (+ zh-CN), the T6-3 caller-side direction RFC enforcing the two consent gates (quote consent before the call + explicit `Charged N points` line in the outcome view), trust_tier rendering rules at three sites, preflight quote handling, the mandated `non-fiat, non-withdrawable` disclosure, and the five-class refund toast template + the explicit no-toast cases for hold/debit; on origin branch codex/billing-caller-consent-rfc. NO code change in this CHG; NO contract / runtime / API surface change in any of the three submodules — these commits are entirely under docs/planned/design/. The triple bump is grouped because all three RFCs only make sense as a set: protocol locks the direction, platform commits to its surface map, and client commits to its consent contract; promoting any one of them in isolation would leave the other two staring at a half-cited reference. Verified on this pinned combination by check:submodules (origin reachability green for all three SHAs across codex branches), check:boundaries, check:bundles, test:contracts in the fourth-repo workspace. test:integration not re-run for this CHG: NOTHING in the integration path can possibly change because the diff is exclusively new markdown under docs/planned/design/ in three repos (no source files, no tests, no CI scripts, no schemas). Same rationale as CHG-2026-009/010/011/018/019/020/021/022 family for chrome/UX-only React refactors, generalised here to docs-only RFC bumps. Follow-up CHG bundles will arrive when each of platform's P-1..P-4 milestones lands a concrete impl-RFC on top of these three direction RFCs (and at that point integration tests must be re-run because schemas / contracts / runtime behaviour will all be in scope)."
