notes: "docs-only client bump that records the third piece of the protocol/platform/client P-1 trio. Closes the client-side P-1 milestone by freezing what ops-console + ops CLI can ship in P-1: 2 ops-console hooks (`useTenantBalance()`, `useTenantLedger(opts)`) with discriminated-union return types and field names that mirror platform endpoint response (snake → camel); 1 component + 1 list + 1 page (`<TenantBalanceCard>` pinned to Dashboard top, `<LedgerList>`, `/balance` route — deliberately NOT under `/caller/` or `/responder/` to physically realise platform P-1 RFC §3.1's unified balance); 1 ops CLI command group (`delexec tenant balance` and `delexec tenant ledger`) with frozen group/subcommand names, TTY output in PTS units, `--json` output in the existing `{ok, command, data}` envelope; ClientError shape with a 6-value `code` union covering platform P-1 error codes plus `ERR_NETWORK` / `ERR_UNAUTHORIZED`; exit code map (0 / 1 / 2 / 3 / 4) with code 2 reserved for `ERR_LOCAL_MODE` (graceful when platform isn't attached). The narrow scope choice: in P-1 the client is a balance observer, not a billing participant — caller-skill / Agents / CLI keep firing calls and receiving results, balance is just a read-only window; the actual billing path (hold / debit / refund / quote) arrives in P-2. Things explicitly NOT shipped in P-1 and deferred per appendix B: preflight quote drawer / Agent prompt consent gate (P-2), 5 auto-refund toasts (P-2), trust_tier badge / disclaimer rendering (P-3), caller-skill MCP tool schema changes (P-2), `pending_credit_cents` write paths from the client (P-3). The two consent gates from caller-consent direction RFC §2.1 are explicitly registered as a non-conflict — P-1 not shipping them is a progress matter, not a direction violation; if P-2 ever conflicts with the direction RFC, the workflow is to revise the direction RFC PR first then write the P-2 implementation RFC. NO code change; the diff is exclusively two new markdown files under `repos/client/docs/planned/design/`. zh-CN is the source of truth (1086 lines across both files; en is a literal mirror). On origin branch `codex/billing-p1-client-rfc` plus main fast-forward; main was also force-aligned to origin (11 commits backlog from CHG-2026-021..024 superprojects' client SHAs — those were already pinned in the workspace but not pushed to origin/main of the client repo; this CHG fixes that drift). Verified on this pinned SHA combination by check:submodules (origin reachability green for `8a6eae4` across both `main` and `codex/billing-p1-client-rfc`), check:boundaries, check:bundles, test:contracts in the fourth-repo workspace. test:integration not re-run for this CHG: same rationale as CHG-2026-009..026 docs-only family — nothing in the integration path can move because the diff is exclusively new markdown under docs/planned/design/. Follow-up CHGs arrive when client P-1 milestones C1.1..C1.4 land actual code (hooks / TenantBalanceCard / `/balance` route / ops CLI `tenant` group / HelpPage update); those CHGs must run integration tests because hooks / pages / CLI / runtime behaviour will all be in scope, and they must wait for platform P-1 M1.4 GA per §1.3 release gate #3."
