notes: "Adds deployability:dashboard and deployability:dashboard -- --json as a fourth-repo, read-only aggregate payload for top-level dashboards and CI. The command combines deployability overview, quickstart, safety, doctor, and compatibility JSON sections, reports section status, blockers, warnings, safety defaults, and next commands, and does not read .env files, call Docker, bind ports, probe networks, or print secrets. Updates quickstart, safety, doctor, and handoff command maps; adds dashboard tests; updates README, deployability PRDs, local-dev runbooks, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
