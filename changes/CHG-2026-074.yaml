notes: "Adds selfhost:status -- --json so dashboards and management scripts can consume runtime Docker compose service state, secret hygiene status, configured health endpoint checks, blockers, and safety notes without parsing terminal prose. Text status behavior remains available. The JSON path captures compose ps output, probes health endpoints, preserves nonzero exit semantics when runtime checks fail, and does not print secret values. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
