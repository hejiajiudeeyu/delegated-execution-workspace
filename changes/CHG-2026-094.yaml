notes: "Adds deployability:doctor and deployability:doctor -- --json as a fourth-repo, read-only deployability readiness snapshot. The command checks compatibility ledger, top-level scripts, documentation, brand-site, and safety-contract alignment while treating dirty submodule worktrees as warnings and bundle mismatches or dirty gitlink markers as blockers. It does not read .env files, call Docker, bind ports, probe networks, or print secrets. Updates README, deployability PRDs, local-dev runbooks, main readiness docs, deployability overview/quickstart/safety/handoff metadata, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
