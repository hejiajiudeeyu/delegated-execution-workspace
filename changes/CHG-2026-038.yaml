notes: "Adds tools/local-stack.mjs and test:local-stack as a fourth-repo managed one-command local bootstrap for the daily agent loop. dev:local:up initializes and starts the platform profile, starts relay as a managed background process, runs client bootstrap, and starts the ops supervisor as a managed background process. dev:local:status, dev:local:logs, and dev:local:down provide matching management commands without adding business runtime truth to the fourth repo."
