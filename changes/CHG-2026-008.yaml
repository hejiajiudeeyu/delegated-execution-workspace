notes: "protocol-only bump. Tagged release: @delexec/contracts@0.1.1 published to npm registry on 2026-04-20 with sigstore provenance (transparency log entry 1341642756). Three commit chain: c05569f wires NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} into the publish step env (root cause of the previous E401 was that setup-node@v5's generated .npmrc dereferences ${NODE_AUTH_TOKEN} but the run step had no env block); 66ab0c2 adds repository.url/homepage/bugs/license=Apache-2.0 to packages/contracts/package.json so --provenance can verify the sigstore bundle against the source repo (fix for E422 'Failed to validate repository information'); ae81c3a removes the one-off auth diagnostic step now that publish is green. No code, schema, or template changes vs fac73ae — same 59 files, 60.9 kB tarball, sha 8986c429... -> b9054fc95... only because of the metadata diff. Caller-side dependency bumps (@delexec/contracts: ^0.1.0 -> ^0.1.1) are not required for this CHG; existing 0.1.0 consumers continue to work. NPM_TOKEN secret was rotated in delegated-execution-protocol GH repo before this run; the previous secret had silently expired (npm whoami returned E401 with a 40-char token present)."
