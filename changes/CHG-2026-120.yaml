notes: "Adds deployability:recipe as a read-only profile-specific first-run recipe that combines deployability menu, runbook, onboarding, and readiness metadata into linear inspect, gate, start, verify, operate, and evidence steps. The command is intended to reduce first-run operator ambiguity without reading .env files, calling Docker, binding ports, probing networks, printing secrets, or introducing protocol/client/platform runtime truth."
