notes: "test-only client commit on the ops-console Phase 2 Stage 2 RTL follow-up — closes part of the deferred coverage from CHG-2026-019/020/021. Adds 9 deterministic test cases across 2 files (`tests/unit/ops-console.caller-approvals.test.tsx` and the new `tests/unit/ops-console.catalog.test.tsx`); no production code change in this commit. ApprovalsPage (6 new cases on top of the existing 3): M6 — allow_listed mode shows the green `auto-pass` popover with the matching copy and the `查看 / 管理白名单` link; M6 — manual mode shows the amber warning popover with the `切换到白名单自动放行` CTA; M6 — sessionStorage[\"whitelist-popover-shown-count\"] >= 3 suppresses subsequent popovers but the toast still fires; M7 — 5 approvals against the same hotline within 7 days fires the per-hotline-high-frequency banner (chosen over monthly_volume by the actionability ordering); M7 — a 5-pending backlog fires the queue-backlog banner with the `批量批准信任的` CTA; M7 — a localStorage[\"approvals.tired-banner.dismissed-at\"] within the 24h cooldown window suppresses the banner even when the trigger condition is otherwise met. CatalogPage (new test file, 3 cases): M8 — empty catalog renders the double-CTA EmptyCatalogState with both `打开 Hotline 管理` and `去 Dashboard 启用平台模式`; default render auto-selects the first hotline and enables the title-bar `试拨当前 Hotline` button after detail loads; deep-link `?hotline_id=<id>` auto-opens the TryCallDrawer with the matching `试拨 · <display_name>` title and the `发送调用` submit button. Test envelope: 11 files, 120 tests, all green. Persistence is reset per test (sessionStorage + localStorage cleared in afterEach) to keep M6/M7 isolation watertight. NO supervisor / CLI / caller-skill HTTP / MCP adapter / responder controller / protocol / platform surface change. Whole change in tests/unit/ — pure RTL coverage. Verified by `corepack pnpm run test:unit` 11/11 files, 120/120 tests passing. tsc errors unchanged from CHG-2026-022 baseline (12 pre-existing in ResponderHotlinesPage / ResponderReviewPage / sonner.tsx). Diff stat for the client commit: 2 files changed, 426 insertions, 0 deletions. Integration tests not re-run for this CHG: same rationale as CHG-2026-009/010/011/018/019/020/021/022/023 — a test-only diff cannot move the integration baseline. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts in the fourth-repo workspace after pushing client commit 288a8da to origin branch codex/ops-console-stage2-tests. CallsPage RTL coverage remains queued (three-pane Calls detail surface + raw JSON toggle interactions + retry CTA flow are heavier than this PR's scope) and will land in a future CHG."
