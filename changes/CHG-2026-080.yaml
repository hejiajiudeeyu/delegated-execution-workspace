notes: "Adds selfhost:audit-export -- --json so CI, dashboards, and management scripts can inspect audit export metadata including source URL, output path, limit, item count, and safety notes without printing the platform admin key or exported audit body. The export artifact still contains the fetched audit response and must be stored privately when it contains operator-sensitive evidence. Text audit-export behavior remains available for private operator terminals. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
