notes: "T-403 public-docs rehearsal found that npm install -g @delexec/ops@0.1.1 failed on macOS Node 22 because the published package could leave better-sqlite3 without a usable prebuild-install command during global installation. Client commit 9d8823dd569c72cdd2d1d31f1491e28209e9feb8 adds a global-prefix tarball regression test, clears stale staged node_modules before packing, sanitizes vendored workspace package manifests, and bundles prebuild-install plus its dependency closure so global npm lifecycle scripts can resolve the helper. Local verification passed targeted global install test, full ops CLI integration, npm test, and npm run test:packages. GitHub CI run 27477010891 passed after rerun with npm ci, unit, integration, and package checks. GitHub Actions publish run 27477110081 passed npm test, npm run test:packages, and npm publish --workspace @delexec/ops --access public. npm registry now returns @delexec/ops@0.1.2, and a real npm install -g smoke in /tmp/delexec-ops-012-global-smoke-20260613T194557Z installed successfully and ran delexec-ops setup/doctor with structured output."
