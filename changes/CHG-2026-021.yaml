notes: "client-only feature commit on ops-console Phase 2 Stage 2 — ApprovalsPage slice. Closes the §4 caller-side approvals slice from brand-site/docs/console-content-spec.md by adding the two console-spec mechanisms previously missing from the page. (§4.0b) M7 「审批疲劳」横幅: evaluator runs against the full approval history (not the active filter tab) on each load/poll; three actionable triggers picked in highest-actionability order — (1) same hotline manually approved >=5 times within 7 days → primary CTA inlines `加入 Hotline 白名单 →` (writes /caller/global-policy directly, no nav), (2) mode=manual with >=20 manual approvals in last 30 days → `去切换模式 →` /caller/preferences?from=approvals-tired-banner, (3) backlog >=5 pending → `批量批准信任的 →` (focuses pending tab + scrollIntoView). Banner is a yellow Alert with 3px brand-yellow left border and ShieldAlert icon; can be dismissed via × → localStorage[\"approvals.tired-banner.dismissed-at\"] = now → 24 h cooldown, re-evaluated on next mount. (§4.3 / M6) 加白名单后教育 popover: rendered on the actions row right after a successful POST /caller/global-policy (8 s auto-dismiss, hover pauses timer, manual × close, sessionStorage[\"whitelist-popover-shown-count\"] >= 3 suppresses subsequent popovers in the same session). Two copy variants — mode=allow_listed (绿底) shows `已加入白名单 ✓ — 后续 <name> 自动放行` + 一行链接 `查看 / 管理白名单 →` (/caller/access-lists?from=approvals-add-whitelist); mode=manual|allow_all (黄底) shows `已加入 ✓ · 但当前模式不会自动放行` + 主按钮 `切换到白名单自动放行 →` (/caller/preferences?from=approvals-add-whitelist) + 次链接 `保留当前模式，先看名单 →`. Mechanics around these: /caller/global-policy is loaded once on mount so the popover can pick the correct copy variant without re-fetching per click (the PUT response refreshes the local mode cache); a separate /caller/approvals (no status filter) fetch backs the M7 evaluator so per-hotline / 30-day stats survive when the user switches the active tab to e.g. `pending`; handleAllowHotline now signals add/no-op back to the card so the popover only opens on the actual write (not on `已在白名单` no-ops); usePoll merges list + stats so M7 stays live during agent runs. NO supervisor / CLI / caller-skill HTTP / MCP adapter / responder controller / protocol surface / platform API change. Whole change in apps/ops-console/src/pages/caller/CallerApprovalsPage.tsx (+458 / -42) plus tests/unit wrap fix in tests/unit/ops-console.caller-approvals.test.tsx (MemoryRouter wrapper + storage reset). Verified by `corepack pnpm run test:unit` 10/10 files, 111/111 tests passing — adds no new RTL coverage for M6/M7 themselves (queued alongside the T1-2/T1-3 follow-up). tsc errors unchanged from CHG-2026-020 baseline (12 pre-existing in ResponderHotlinesPage / ResponderReviewPage / sonner.tsx). Diff stat for the client commit: 2 files changed, 477 insertions, 45 deletions. Integration tests not re-run for this CHG: same rationale as CHG-2026-009/010/011/018/019/020 — a chrome/UX-only React refactor doesn't touch CLI / supervisor / caller-skill HTTP / MCP adapter / responder controller surfaces, MCP-host golden-four loop from CHG-2026-008 remains the normative end-to-end check against the same protocol/platform pinned here. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts in the fourth-repo workspace after pushing client commit 685aab0 to origin branch codex/ops-console-stage2-approvals."
