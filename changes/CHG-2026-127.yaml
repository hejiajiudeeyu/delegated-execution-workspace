notes: "Adds deployability:release as a top-level release candidate review for operator and management surfaces. The command aggregates existing production hardening review, public exposure review, published-image plan, and published-image dry-run smoke evidence into one JSON/text payload, separates script blockers from release_blockers, does not publish images or packages, does not start services, bind ports, probe endpoints, or print secrets, and does not introduce protocol/client/platform runtime truth. Brand-site deployability docs expose the same command."
