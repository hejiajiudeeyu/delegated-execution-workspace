notes: "Adds selfhost:init -- --json so dashboards, CI jobs, and deployment scripts can consume first-run or repeat-run env initialization metadata without parsing terminal prose. The JSON output reports created/hardened .env action, changed files, secret hygiene statuses, warnings, and next commands, and intentionally omits generated secret values and profile URL prose. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
