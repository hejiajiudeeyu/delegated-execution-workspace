notes: "Updates call-anything-brand-site Deployability Profiles in Chinese and English to document the shared pipeline summary metadata contract now used by deployability:overview, deployability:dashboard, and deployability:handoff. The page now names command_count, json_command_count, catalog_command_count, dashboard_safe_command_count, ci_safe_command_count, public_exposure_gate_count, next_commands, next_json_commands, and safety_notes so operator-facing docs match the dashboard and handoff payloads. Strengthens the brand-site deployability content smoke test to prevent the shared summary contract from drifting out of the public docs, wires that smoke into deployability:doctor as a read-only brand-site content drift gate, adds test:deployability as the one-command regression gate for the top-level deployability surface, adds test:deployability-operations as the one-command regression gate for operator-facing deployment and management surfaces, and makes that operations gate discoverable from overview next commands, the safety matrix, and the searchable command catalog. Keeps protocol, client, and platform SHAs unchanged."
