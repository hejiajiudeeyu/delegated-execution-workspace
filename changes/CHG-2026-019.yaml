notes: "client-only feature commit on ops-console Phase 2 Stage 2 — CallsPage slice. Closes spec gaps in caller/CallsPage against brand-site/docs/console-content-spec.md §2: (§2.1) top bar gains a primary CTA \"去 Catalog 发起调用\" plus a destructive count badge on the approval-center button when any approvals are pending; (§2.2) three-stat header reworded to \"待审批 / 总调用次数 / 运行中\" with skeletons during loading; (§2.3.1) list rows rewritten as CallSummaryRow human-readable headlines (<HotlineDisplayName> · <intent verb> + relative time / 发起方 / 审批路径 + OutcomeBadge), with mono request_id / responder_id / hotline_id removed from the default surface (still available via raw JSON toggles in the detail panel); (§2.3.3) ManualCallForm DELETED — ~280 lines of in-page \"manual test call\" form removed; the only entry for new calls is now `/caller/catalog` 「试拨」, per spec rationale that Calls is a history view; (§2.4) detail panel rewritten as three-section human view: Section A summary (hotline name · action + result line + chips), Section B 请求背景 (时间 absolute+relative / 发起方 / Hotline / Responder / 审批路径 / 输入参数 parsed key-value list), Section C 请求结果 with semantic-color left rail per status (completed / failed / running / result_pending / pending_approval / rejected_by_approval); (§2.4 §M5) failed status shows mandatory three-CTA next-step block (重试调用 carries hotline_id + base64-prefilled input via ?from=calls-retry, 查看 Responder 日志, 报告问题 with clipboard diagnostic dump), and rejected_by_approval shows two-CTA block (以后自动放行此 Hotline / 换成「白名单自动放行」模式); retryable=false disables the retry button with tooltip; (§2.5) when 0 requests, full-page EmptyState with primary CTA \"打开 Catalog\" + secondary \"去 Dashboard 看上手清单\". NO supervisor / CLI / caller-skill HTTP / MCP adapter / responder controller / protocol surface / platform API change. Verified by `pnpm run test:unit` 10/10 files, 111/111 tests passing — no regression in existing AccessLists / CallerApprovals / NextUpCard / PlatformValueDisclosure RTL suites; CallsPage RTL coverage is queued for a follow-up commit since this is a high-volume rewrite. tsc errors unchanged from CHG-2026-018 baseline (12 pre-existing in ResponderHotlinesPage / ResponderReviewPage / sonner.tsx). Diff stat for the client commit: 1 file changed, 693 insertions, 501 deletions. Integration tests not re-run for this CHG: same rationale as CHG-2026-009/010/011/018 — a chrome/UX-only React refactor doesn't touch CLI / supervisor / caller-skill HTTP / MCP adapter / responder controller surfaces, MCP-host golden-four loop from CHG-2026-008 remains the normative end-to-end check against the same protocol/platform pinned here. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts in the fourth-repo workspace after pushing client commit 067a8db to origin branch codex/ops-console-stage2-callspage. Side note: brand-site submodule pointer is also bumped to d17933d in the same workspace commit (carries the L2 Pricing/Glossary/FAQ alignment with the billing direction RFC, separately committed and pushed earlier today); brand-site is intentionally outside the readiness-ledger flow and has no dedicated CHG entry."
