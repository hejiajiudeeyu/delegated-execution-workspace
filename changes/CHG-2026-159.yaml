notes: "T-405 client commit 686f968e4cefd2dd268efb02c289d412b270701c adds delexec-ops call-hotline, a public paid-call wrapper for Caller users. The command requests a billing-acknowledged task token, fetches delivery metadata with local://relay/caller-controller/:request_id result delivery, creates a local caller-controller request, dispatches through caller-controller, polls caller inbox and result, then fetches Platform request events, balance, and ledger evidence without printing Caller API keys. @delexec/ops is bumped to 0.1.5. Local client verification passed targeted RED/green paid-call CLI integration, targeted help coverage, full ops CLI integration, npm test, and npm run test:packages. Clean-room tarball smoke installed delexec-ops-0.1.5.tgz and confirmed help exposes call-hotline. Root validation passed check:submodules, check:boundaries, check:bundles, test:contracts, and test:integration. Local npm publish is blocked by ENEEDAUTH, so public docs should keep the low-level curl path until @delexec/ops@0.1.5 is published."
