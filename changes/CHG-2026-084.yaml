notes: "Adds published-image:smoke -- --dry-run --json so release dashboards and management scripts can inspect the public-stack published-image smoke command, image refs, environment metadata, dry-run result status, and safety notes without starting Docker. The JSON smoke path omits delegated platform smoke stdout because it can contain environment-specific runtime details, captures only bounded stderr metadata, and does not print secret env values. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
