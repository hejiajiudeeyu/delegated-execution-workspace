notes: "client-only feature commit on ops-console Phase 2 Stage 2 — DashboardPage slice. Closes spec gaps in general/DashboardPage against the brand-site high-fidelity console-content-spec.md §1: (§1.2b) PlatformValueDisclosure NEW component — folded value-comparison disclosure shown only when platform mode is off; click-to-expand 5-row table comparing catalog source / hotline visibility / privacy / network / fit between local and platform modes; right-side X dismisses for the session via sessionStorage[\"dashboard.platform-value-table.dismissed\"]; primary CTA opens platform mode, secondary link to /help#platform-mode. (§1.5) Onboarding flow 4 → 5 steps — adds the previously-missing step 5 \"试拨第一个 Hotline\" with done = (requests.length > 0); all step buttons now carry ?from=dashboard-onboarding so FromContextChip renders on landing pages; the card title shows N/5 progress; when all five steps are done the card folds into a green \"上手已完成 ✓ 5/5 · 重新展开\" success bar (state held in component, not persisted). (§1.5b) NextUpCard NEW component — the always-on \"下一步\" 6-state state machine card, placed between the caller-not-registered card and the platform toggle card; polls /requests and /caller/approvals?status=pending every 5s; short-circuits in priority order needs_caller_register > has_pending_approvals > has_recent_failures (1h window) > needs_first_hotline > needs_first_call > all_normal; each state renders a 3px left rail in its semantic color (error / warning / teal / success) plus a state-specific icon, title, body, primary CTA, and secondary link; all_normal shows last activity + today's completed count. New components live under apps/ops-console/src/components/dashboard/. NO supervisor / CLI / caller-skill HTTP / MCP adapter / responder controller / protocol surface / platform API change. Verified by `pnpm run test:unit` 10/10 files, 111/111 tests passing including +5 new PlatformValueDisclosure RTL + 9 new NextUpCard RTL covering all 6 states, priority precedence, and stale-failure exclusion; tsc errors unchanged from CHG-2026-011 baseline (all pre-existing in ResponderHotlinesPage / ResponderReviewPage / sonner.tsx); a local browser smoke at http://127.0.0.1:4174 against an already-running fully-bootstrapped supervisor showed the expected layout (caller card hidden, NextUp in all_normal state with green rail, onboarding folded to success bar, value disclosure hidden because platform was enabled). Integration tests not re-run for this CHG: same rationale as CHG-2026-009/010/011 — a chrome/UX-only React refactor doesn't touch CLI / supervisor / caller-skill HTTP / MCP adapter / responder controller surfaces, MCP-host golden-four loop from CHG-2026-008 remains the normative end-to-end check against the same protocol/platform pinned here. Diff stat for the client commit: 5 files changed, 789 insertions, 36 deletions. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts, and test:integration in the fourth-repo workspace after pushing client commit 0d3e65d to origin branch codex/ops-console-stage2-dashboard."
