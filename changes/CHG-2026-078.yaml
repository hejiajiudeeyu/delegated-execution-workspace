notes: "Adds selfhost:up -- --json so dashboards, management scripts, and runbooks can inspect startup metadata across init, preflight, compose-up status, blockers, and stderr lines without embedding init, preflight, or Docker compose up stdout. The JSON path intentionally omits command stdout because startup output may contain sensitive values. Text up behavior remains available for private operator terminals. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
