notes: "Adds deployability:profiles as a read-only, machine-readable profile catalog for management UIs, dashboards, CI, and operator docs. The command derives profile cards from deployability:dashboard profile_summaries and the shared fourth-repo profile registry, including aliases, labels, pipeline keys, attention metadata, recommended_profile_keys, next commands, JSON commands, counts, and safety notes. Also extracts the profile registry shared by deployability:action-plan and deployability:commands so profile keys and aliases do not drift across management surfaces. Protocol, client, platform, and brand-site SHAs are unchanged."
