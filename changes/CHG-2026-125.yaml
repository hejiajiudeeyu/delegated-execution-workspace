notes: "Adds deployability:production as a read-only production hardening boundary review that separates daily deployability from public exposure and formal production readiness. The command projects existing roadmap, gates, and status metadata to surface billing, email, marketplace, and formal release gates without reading .env files, calling Docker, binding ports, probing networks, printing secrets, introducing runtime truth, or changing protocol/client/platform business behavior. Brand-site deployability docs expose the same command."
