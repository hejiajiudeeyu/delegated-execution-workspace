notes: "Fixes the T-403 pre-run public-docs risk where the package-first Responder quick start later sent unknown responders back to source-only npm script commands for enable-responder, add-hotline, submit-review, and status. Brand-site commit 7c8688877c031f4598bf9bb975c8d6c19e2333b1 switches Chinese and English Responder quick starts to the published delexec-ops CLI for responder identity, example hotline, custom hotline, submit-review, and status steps, while retaining source checkout only as a contributor path. The content smoke now asserts these commands use the published CLI and rejects the source-only variants. Owning repo verification passed: npm run smoke:first-real-call-content, targeted eslint, npm run build. Deployed to Aliyun /var/www/html after backup /home/admin/site-backups/html.20260613T050235Z.tgz, preserving /boids*. Public checks passed for Chinese and English Responder quick starts with deploycheck=20260613T050235Z: both pages return 200, include delexec-ops auth register/add-hotline/submit-review/status, and omit the old npm run ops variants for those responder steps. Public health and marketplace API remained healthy."
