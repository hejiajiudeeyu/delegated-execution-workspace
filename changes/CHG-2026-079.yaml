notes: "Adds selfhost:smoke -- --json so CI, dashboards, management scripts, and runbooks can inspect post-start acceptance metadata across secret hygiene, compose config, public route contract, health endpoints, blockers, and safety notes without embedding expanded Docker compose config stdout. The JSON path intentionally omits compose config stdout because expanded compose output may contain environment values. Text smoke behavior remains available for private operator terminals. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
