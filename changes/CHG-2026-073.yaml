notes: "Adds selfhost:plan -- --json so generated docs, dashboards, and management scripts can consume the same read-only selected-profile deployment map that operators see in terminal output: purpose, deploy paths, services, URLs, safety checks, and non-secret notes. The JSON path does not call Docker, mutate files, probe the network, or print secret values. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
