notes: "client-only feature commit on ops-console Phase 2 Stage 2 — CatalogPage slice. Closes spec gaps in caller/CatalogPage against brand-site/docs/console-content-spec.md §5.2: (§5.2) TryCallDrawer NEW component — replaces the previous redirect-to-/caller/calls/new flow (which became a dead route after CHG-2026-019 deleted ManualCallForm) with an in-place Sheet drawer; form fields auto-generated from input_schema.properties (string→Input, enum→Select, required asterisk + client-side validation, default values prefilled), submit dispatches POST /requests/example for the official example hotline and POST /calls/confirm for everything else, success toasts and navigates to /caller/calls?selected=<request_id>&from=calls-retry to close the T1-3 retry loop end-to-end; failure shows in-drawer Alert without leaving. (§5.2) Deep-link params: ?hotline_id=<id> auto-selects + auto-opens the drawer once detail loads (consumed afterwards so re-mount doesn't re-trigger), ?prefill=<base64-encoded-json> decoded into the drawer's initial form values to support the T1-3 calls-retry deep-link, ?from=dashboard-onboarding / dashboard-nextup render FirstCallTipBanner with state-specific copy (dismiss writes localStorage[\"catalog.first-call-tip.dismissed\"]). (§5.2 §M8) Zero-hotlines EmptyState NEW — full-card EmptyCatalogState with double CTA (打开 Hotline 管理 → /responder/hotlines, 去 Dashboard 启用平台模式 → /); the spec's third demo-loader CTA is omitted because POST /catalog/load-demo-hotlines does not exist (spec rule: real endpoint or delete the button). Title-bar 试拨 button preserved as primary top-right action; per-row 试拨 button on each catalog card opens the drawer pre-pointed at that hotline. NO supervisor / CLI / caller-skill HTTP / MCP adapter / responder controller / protocol surface / platform API change. Whole change in apps/ops-console/src/pages/caller/CatalogPage.tsx. Verified by `pnpm run test:unit` 10/10 files, 111/111 tests passing — no regression in existing AccessLists / CallerApprovals / NextUpCard / PlatformValueDisclosure RTL suites; CatalogPage RTL coverage is queued alongside the CHG-2026-019 follow-up since both are high-volume rewrites in the same Stage 2 series. tsc errors unchanged from CHG-2026-019 baseline (12 pre-existing in ResponderHotlinesPage / ResponderReviewPage / sonner.tsx). Diff stat for the client commit: 1 file changed, 597 insertions, 219 deletions. Integration tests not re-run for this CHG: same rationale as CHG-2026-009/010/011/018/019 — a chrome/UX-only React refactor doesn't touch CLI / supervisor / caller-skill HTTP / MCP adapter / responder controller surfaces, MCP-host golden-four loop from CHG-2026-008 remains the normative end-to-end check against the same protocol/platform pinned here. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts in the fourth-repo workspace after pushing client commit 9da22f7 to origin branch codex/ops-console-stage2-catalogpage."
