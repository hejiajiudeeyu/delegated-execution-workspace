notes: "Adds derived profile attention metadata to deployability:action-plan so management surfaces can sort profile cards and highlight public exposure gates without re-deriving risk from command lists. Each profile receives attention.level, attention.rank, attention.reasons, primary_command, and primary_json_command, and the top-level payload exposes recommended_profile_keys. The metadata is derived from existing dashboard and command catalog posture data and does not introduce a new source of truth. Updates PRDs, readiness docs, local-dev runbooks, and call-anything-brand-site. Protocol, client, and platform SHAs are unchanged."
