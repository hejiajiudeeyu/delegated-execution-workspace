notes: "Adds selfhost:down -- --json so dashboards, management scripts, and runbooks can inspect stop command metadata, exit status, blockers, and stderr lines without embedding raw Docker compose down stdout. The JSON path intentionally omits compose down stdout because compose output may contain sensitive values. Text down behavior remains available for private operator terminals. Updates README, runbooks, deployability PRDs, main readiness docs, and brand-site Deployability Profiles while keeping protocol/client/platform SHAs unchanged."
