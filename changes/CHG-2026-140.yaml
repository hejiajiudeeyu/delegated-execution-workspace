notes: "Implements first-real-call T-301 platform enforcement on top of protocol commit 889dd94. BILLING_ENFORCEMENT remains disabled by default; enforced paid calls now validate caller billing consent, check prepaid balance before task-token issuance, write a hold ledger row, include billing claims in token claims, settle successful terminal events, and refund failed terminal events. Platform package checks, public-stack source-build checks, and fourth-repo source integration now stage the local sibling @delexec/contracts tarball so local-only protocol billing exports are used before formal npm publication; formal release still requires publishing @delexec/contracts first. Platform verification passed npm test, npm run test:service:packages, npm run test:deploy:config, and npm run test:public-stack-smoke. Fourth-repo validation used SKIP_ORIGIN_REACHABILITY=1 because the protocol/client/platform/brand-site commits are local-only."
