notes: "client-only feature commit on ops-console Phase 2 Stage 2 — /help slice. Replaces the Stage 1 stub HelpPage with the full brand-site/docs/console-content-spec.md §5.7 article: sticky 8-chapter TOC + scroll-anchored sections, organised by user journey rather than system module, closing the deep-link target gap that every Stage 2 page now points at (NextUp 卡 secondary link / M7 banner secondary link / Calls failure CTAs / `?from=...` hand-offs). 8 chapters (each = 1 opening paragraph `为什么你需要看这章` + body + inline CTA): (1) #what-is-caller — Caller vs Responder, two-column callout; (2) #first-call — 5-step end-to-end walkthrough; (3) #what-is-hotline — REST API + Schema + 审批/计费 复合体; (4) #approvals — three modes + whitelist + the popover trap; (5) #platform-mode — local-vs-platform value table; (6) #troubleshooting — 5 symptom cards (responder offline / PENDING_APPROVAL stuck / platform API unreachable / whitelist not honoured / raw JSON output); (7) #faq — 10 console-relevant Qs (no Stripe, no withdrawal, unified caller+responder account, hallucination liability, manual+whitelist trap, etc.); (8) #feedback — diagnostic-bundle + GitHub issue + email. Mechanics: IntersectionObserver-driven ScrollSpy keeps the active TOC entry highlighted as the user scrolls; useEffect on location.hash does the actual scroll (BrowserRouter doesn't auto-scroll for hash changes), so /help#approvals etc. land on the right section even when navigated to programmatically; a ?from=<key> chip renders a fromContext breadcrumb under the page header for the five known hand-off keys; three CTA variants let every chapter end on a real action. Side fix: ApprovalsPage M6 popover and CallsPage failed-CTA both incorrectly pointed at /caller/access-lists; the actual route registered in App.tsx is /caller/lists — both navigate() calls corrected. NO supervisor / CLI / caller-skill HTTP / MCP adapter / responder controller / protocol / platform surface change. Whole change in apps/ops-console/src/pages/help/HelpPage.tsx (+694 / -91) plus 1-character path fix in apps/ops-console/src/pages/caller/CallerApprovalsPage.tsx and apps/ops-console/src/pages/caller/CallsPage.tsx. Verified by `corepack pnpm run test:unit` 10/10 files, 111/111 tests passing — HelpPage adds no new RTL coverage on its own. tsc errors unchanged from CHG-2026-021 baseline (12 pre-existing in ResponderHotlinesPage / ResponderReviewPage / sonner.tsx). Diff stat for the client commit: 3 files changed, 694 insertions, 91 deletions. Integration tests not re-run for this CHG: same rationale as CHG-2026-009/010/011/018/019/020/021 — chrome/UX-only React refactor doesn't touch CLI / supervisor / caller-skill HTTP / MCP adapter / responder controller surfaces, MCP-host golden-four loop from CHG-2026-008 remains the normative end-to-end check against the same protocol/platform pinned here. Verified on the pinned SHA combination by rerunning check:submodules, check:boundaries, check:bundles, test:contracts in the fourth-repo workspace after pushing client commit 510e4b9 to origin branch codex/ops-console-help-page."
